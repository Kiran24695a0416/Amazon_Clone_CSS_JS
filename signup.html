<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Clone - Sign Up</title>

<style>
*{
    margin:0;
    padding:0;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#f5f5f5,#d9e4f5);
}

table{
    padding:35px;
    border:1px solid #ddd;
    border-radius:12px;
    background:white;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    transition:0.4s;
}

table:hover{
    transform:translateY(-5px);
    box-shadow:0 12px 30px rgba(0,0,0,0.3);
}

h2{
    color:#ff9900;
    margin-bottom:20px;
}

td{
    padding:10px;
}

label{
    font-weight:bold;
}

input{
    width:220px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    outline:none;
    transition:0.3s;
}

input:hover{
    border-color:#ff9900;
}

input:focus{
    border-color:#ff9900;
    box-shadow:0 0 8px rgba(255,153,0,0.5);
}

.btn{
    display:inline-block;
    width:100%;
    padding:10px;
    text-align:center;
    text-decoration:none;
    border-radius:5px;
    background:#ff9900;
    color:white;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#e68a00;
    transform:scale(1.05);
    box-shadow:0 5px 12px rgba(0,0,0,0.3);
}

.btn:active{
    transform:scale(0.98);
}
</style>

</head>

<body>

<table>

<tr>
    <td colspan="2" style="text-align:center;">
        <h2>Create Account</h2>
    </td>
</tr>

    <tr>
        <td><label for="new-email">Email</label></td>
        <td><input type="email" id="new-email" required></td>
    </tr>

    <tr>
        <td><label for="new-password">Password</label></td>
        <td><input type="password" id="new-password" required></td>
    </tr>

    <tr>
        <td colspan="2" style="padding-top:15px;">
            <a href="index.html" class="btn">Create Account</a>
        </td>
    </tr>

</table>

</body>
</html>
